services:

  pack-server:
    build: ./pack-server
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - packs:/packs
      - ${MC_DATA}:/data:z
    environment:
      RCON_HOST: mc
      RCON_PORT: 25575
      RCON_PASSWORD: ${RCON_PASSWORD}
    networks:
      - mc-network
    restart: unless-stopped

  mc:
    image: itzg/minecraft-server
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    volumes:
      - ${MC_DATA}:/data:z
    environment:
      EULA: "TRUE"
      MOD_PLATFORM: MODRINTH
      MODRINTH_MODPACK: "http://pack-server:8000/pack"
      MEMORY: "6G"
      ENABLE_RCON: "true"
      RCON_PORT: 25575
      RCON_PASSWORD: ${RCON_PASSWORD}
    depends_on:
      - pack-server
    networks:
      - mc-network
    restart: unless-stopped

volumes:
  packs:

networks:
  mc-network:
    name: mc-network
    external: true